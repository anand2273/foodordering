services:
  - type: web
    name: foodapp-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/v1/health/live/
    preDeployCommand: python manage.py migrate --noinput
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: foodapp-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: foodapp-redis
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: SESSION_COOKIE_SAMESITE
        value: None
      - key: CSRF_COOKIE_SAMESITE
        value: None
      - key: PUBLIC_APP_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: SENTRY_DSN
        sync: false

  - type: worker
    name: foodapp-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: celery -A foodapp worker --loglevel=INFO
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: foodapp-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: foodapp-redis
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: PUBLIC_APP_URL
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: SENTRY_DSN
        sync: false

  - type: cron
    name: foodapp-checkout-cleanup
    runtime: docker
    dockerfilePath: ./Dockerfile
    schedule: "*/15 * * * *"
    dockerCommand: python manage.py cleanup_checkouts
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: foodapp-db
          property: connectionString
      - key: SECRET_KEY
        sync: false

  - type: cron
    name: foodapp-notification-outbox
    runtime: docker
    dockerfilePath: ./Dockerfile
    schedule: "*/5 * * * *"
    dockerCommand: python manage.py process_outbox
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: foodapp-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: foodapp-redis
          property: connectionString
      - key: SECRET_KEY
        sync: false

  - type: cron
    name: foodapp-pii-retention
    runtime: docker
    dockerfilePath: ./Dockerfile
    schedule: "0 3 * * *"
    dockerCommand: python manage.py purge_customer_pii
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: foodapp-db
          property: connectionString
      - key: SECRET_KEY
        sync: false

  - type: redis
    name: foodapp-redis
    plan: starter
    ipAllowList: []

databases:
  - name: foodapp-db
    plan: basic-256mb
    databaseName: foodapp
    user: foodapp
